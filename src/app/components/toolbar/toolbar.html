<header class="main-toolbar">
  <div class="toolbar-container">
    
    <div class="logo-section" routerLink="/">
      <span class="brand-name">La Escondida</span>
    </div>

    <div class="search-section">
      <app-search-bar></app-search-bar>
    </div>

    <div class="actions-section">
      <button class="icon-btn" routerLink="/carrito">
        <span class="material-icons-outlined">shopping_cart</span>
        @if (cartCount() > 0) {
          <span class="badge">{{ cartCount() }}</span>
        }
      </button>
      <button class="icon-btn" routerLink="/mis-pedidos" style="margin-left: 10px;">
        <span class="material-icons-outlined">assignment</span>
        <span style="font-size: 0.9em; margin-left: 4px;">Mis Pedidos</span>
      </button>
      <button class="icon-btn" routerLink="/facturacion" style="margin-left: 10px;">
        <span class="material-icons-outlined">receipt_long</span>
        <span style="font-size: 0.9em; margin-left: 4px;">Facturación</span>
      </button>
    </div>

  </div>
</header>
