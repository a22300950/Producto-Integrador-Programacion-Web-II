<div class="subtitulo">
  <h1>Catálogo</h1>
</div>

@if (productosFiltrados().length === 0) {
  <p>No se encontraron productos para tu búsqueda.</p>
} @else {
  <section class="grid">
    @for (p of productosFiltrados(); track p.id) {
      <app-product-card [product]="p" (add)="agregar($event)"></app-product-card>
    }
  </section>
}
